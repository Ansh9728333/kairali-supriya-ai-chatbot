<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kairali Supriya AI Chatbot</title>
<style>
:root {
  --green:#315a2c;
  --green2:#5f843e;
  --border:rgba(49,90,44,.16);
  --shadow:0 18px 55px rgba(31,42,31,.22);
}
*{box-sizing:border-box}
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#f7f4ea;
  color:#1f2a1f;
  min-height:100vh;
}
.website-preview {
  width:100%;
  min-height:100vh;
  background:#f7f4ea;
}
.website-preview img {
  display:block;
  width:100%;
  height:auto;
  min-height:100vh;
  object-fit:cover;
  object-position:top center;
}
.chat-window {
  position:fixed;
  right:24px;
  bottom:108px;
  width:404px;
  max-width:calc(100vw - 32px);
  height:638px;
  max-height:calc(100vh - 126px);
  background:white;
  border-radius:30px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:none;
  flex-direction:column;
  z-index:999999;
}
.chat-window.open{display:flex}
.chat-header {
  background:linear-gradient(135deg,var(--green),#4f7337);
  color:white;
  padding:18px;
  display:flex;
  gap:12px;
  align-items:center;
}
.avatar {
  width:54px;
  height:54px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.85);
  background:white;
  display:grid;
  place-items:center;
  color:var(--green);
  font-weight:900;
  flex:0 0 auto;
}
.avatar img,.bubble img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}
.agent{font-weight:900;font-size:17px}
.status{font-size:12px;opacity:.9;margin-top:3px}
.version{font-size:11px;opacity:.82;margin-top:3px}
.close {
  margin-left:auto;
  width:34px;
  height:34px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  color:white;
  font-size:20px;
  cursor:pointer;
}
.messages {
  flex:1;
  overflow-y:auto;
  background:linear-gradient(180deg,#fffdf7,#f7fbf4);
  padding:18px;
  scrollbar-width:thin;
}
.msg {
  max-width:86%;
  padding:12px 14px;
  border-radius:18px;
  margin-bottom:12px;
  line-height:1.45;
  font-size:14px;
  white-space:pre-wrap;
}
.bot {
  background:white;
  border:1px solid var(--border);
  border-top-left-radius:6px;
  color:#1f2a1f;
  box-shadow:0 6px 16px rgba(31,42,31,.06);
}
.user {
  margin-left:auto;
  background:var(--green);
  color:white;
  border-top-right-radius:6px;
}

.typing {
  display:none;
  gap:4px;
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  width:fit-content;
  padding:10px 12px;
}
.typing span {
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--green2);
  display:inline-block;
}
.input {
  border-top:1px solid var(--border);
  background:white;
  padding:14px;
  display:flex;
  gap:10px;
}
.input input {
  flex:1;
  border:1px solid var(--border);
  border-radius:999px;
  padding:13px 15px;
  outline:0;
  font-size:14px;
}
.send {
  width:46px;
  height:46px;
  border-radius:50%;
  border:0;
  background:var(--green);
  color:white;
  font-size:18px;
  cursor:pointer;
  flex:0 0 auto;
}
.footer {
  text-align:center;
  color:#657265;
  font-size:11px;
  padding-bottom:8px;
  background:white;
}
.widget {
  position:fixed;
  right:24px;
  bottom:24px;
  z-index:1000000;
}
.bubble {
  width:72px;
  height:72px;
  border-radius:50%;
  border:3px solid white;
  background:white;
  overflow:hidden;
  box-shadow:var(--shadow);
  cursor:pointer;
  position:relative;
  display:grid;
  place-items:center;
  color:var(--green);
  font-weight:900;
}
.badge {
  position:absolute;
  right:-1px;
  bottom:-1px;
  width:22px;
  height:22px;
  border-radius:50%;
  border:2px solid white;
  background:var(--green);
  color:white;
  display:grid;
  place-items:center;
  font-size:12px;
  font-weight:900;
}
@media(max-width:820px){
  .chat-window {
    right:12px;
    bottom:98px;
    width:calc(100vw - 24px);
    height:74vh;
  }
  .widget{right:16px;bottom:16px}
}
</style>
</head>

<script>
const API_URL = "/api/chat";
const chatWindow=document.getElementById("chatWindow");
const messages=document.getElementById("messages");
const input=document.getElementById("chatInput");
const typing=document.getElementById("typing");

// Fresh conversation per browser tab. This prevents old lead details like a previous name/mobile
// from being reused in a new visitor conversation.
let sessionId=sessionStorage.getItem("kairali_chat_session");
if(!sessionId){
  sessionId="sess_"+Date.now()+"_"+Math.random().toString(36).slice(2);
  sessionStorage.setItem("kairali_chat_session",sessionId);
}

let previousResponseId=sessionStorage.getItem("kairali_previous_response_id") || "";

function toggleChat(){chatWindow.classList.toggle("open");if(chatWindow.classList.contains("open"))input.focus();}
function openChat(){chatWindow.classList.add("open");input.focus();}
function closeChat(){chatWindow.classList.remove("open");}
function addMessage(text,type){const div=document.createElement("div");div.className="msg "+type;div.textContent=text;messages.insertBefore(div,typing);messages.scrollTop=messages.scrollHeight;}

async function getBotReply(userMessage){
  const response=await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:userMessage,sessionId,previousResponseId})
  });

  if(!response.ok){
    const errText=await response.text();
    throw new Error(errText || "API error");
  }

  const data=await response.json();
  if(data.responseId){
    previousResponseId=data.responseId;
    sessionStorage.setItem("kairali_previous_response_id", previousResponseId);
  }
  return data.reply || "Sorry, reply generate nahi ho paya.";
}

async function sendMessage(){
  const text=input.value.trim();
  if(!text)return;
  const ctaBar=document.getElementById("ctaBar");
  if(ctaBar) ctaBar.classList.add("hidden");
  addMessage(text,"user");
  input.value="";
  typing.style.display="flex";
  messages.scrollTop=messages.scrollHeight;

  try{
    const reply=await getBotReply(text);
    typing.style.display="none";
    addMessage(reply,"bot");
  }catch(e){
    typing.style.display="none";
    addMessage("API error: " + e.message, "bot");
  }
}
function sendQuick(text){openChat();input.value=text;sendMessage();}
function handleKey(e){if(e.key==="Enter")sendMessage();}
</script>
